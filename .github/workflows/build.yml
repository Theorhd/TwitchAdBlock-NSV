name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Build IPA and create draft release"
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        uses: akusio/setup-theos-action@master

      - name: Setup Swift
        uses: slashmili/setup-swift@v2
        with:
          swift-version: "5.10"

      - name: Build Package (STS Only)
        run: |
          export THEOS_PACKAGE_SCHEME=rootless
          make package FINALPACKAGE=1 STS=1
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TwitchAdBlock-STS-19.4
          path: packages/*.deb
