name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Build IPA and create draft release"
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Swift
        uses: fwal/setup-swift@v1
        with:
          swift-version: "5.10"

      - name: Install Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y libfl-dev zstd libssl-dev
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          git clone https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build Package (STS Only)
        run: |
          export THEOS_PACKAGE_SCHEME=rootless
          make package FINALPACKAGE=1 STS=1
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TwitchAdBlock-STS-19.4
          path: packages/*.deb
